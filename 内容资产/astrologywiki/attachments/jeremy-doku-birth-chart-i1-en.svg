    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Restless, Improvised Movement</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Changes direction mid-thought, favoring the unexpected option over the</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">rehearsed one</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#jeremydokubirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#jeremydokubirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Words as a Working Tool</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Processes out loud — quick interview answer and quick on-field decision come</text>
  <text x="116" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">from the same instinct</text>
  <circle cx="76" cy="277" r="20.0" fill="url(#jeremydokubirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="277" r="15" fill="url(#jeremydokubirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">The Anaretic Urgency</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Mars at 29° surfaces as all-or-nothing timing: act on the moment now, not</text>
  <text x="116" y="313.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">deferred</text>
  <circle cx="76" cy="355" r="20.0" fill="url(#jeremydokubirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="355" r="15" fill="url(#jeremydokubirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="350.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="359.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="351.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Presence Over Posture</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Picks the live, embodied moment over the version that photographs well later</text>
  <circle cx="76" cy="415" r="20.0" fill="url(#jeremydokubirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="415" r="15" fill="url(#jeremydokubirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="410.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="419.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="411.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Audience Awareness That Sharpens</text>
  <text x="116" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Leo Rising rarely forgets being watched — focuses the Gemini instinct rather</text>
  <text x="116" y="451.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">than dulling it</text>
