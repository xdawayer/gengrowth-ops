    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">&quot;Gemini means goals&quot;</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Treats versatility as scoring output; Gemini is the communicator, not the</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">one-note striker</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#mosalahbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#mosalahbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">&quot;The Sun is the whole story&quot;</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The Sun is one voice among many; Moon, houses, and transits carry equal weight</text>
  <circle cx="76" cy="259" r="20.0" fill="url(#mosalahbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="259" r="15" fill="url(#mosalahbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="254.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="263.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="255.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">&quot;A birthday on match day guarantees a result&quot;</text>
  <text x="116" y="277.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A natal activation is a window of emphasis, not a scripted outcome</text>
