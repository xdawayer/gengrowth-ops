    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Find the Cutoff Date</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Locate the youth selection cutoff for the league or country — often January 1 in</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">football</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#bestsoccerplayerszodiacsign0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#bestsoccerplayerszodiacsign0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Expect Overrepresentation</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Births just after the cutoff will be overrepresented among elite players,</text>
  <text x="116" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">regardless of sign</text>
  <circle cx="76" cy="277" r="20.0" fill="url(#bestsoccerplayerszodiacsign0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="277" r="15" fill="url(#bestsoccerplayerszodiacsign0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Use Signs as Labels Only</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Translate those months into zodiac signs as a label, never as a cause of talent</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#bestsoccerplayerszodiacsign0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#bestsoccerplayerszodiacsign0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="332.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="341.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="333.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Watch the Cutoff Move</text>
  <text x="116" y="355.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Notice that the best sign changes when the cutoff changes — which rules</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">astrology out</text>
  <circle cx="76" cy="415" r="20.0" fill="url(#bestsoccerplayerszodiacsign0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="415" r="15" fill="url(#bestsoccerplayerszodiacsign0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="410.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="419.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="411.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Treat Claims as Calendar Artifacts</text>
  <text x="116" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Treat any single-sign claim about elite players as a calendar artifact, not a</text>
  <text x="116" y="451.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">forecast</text>
