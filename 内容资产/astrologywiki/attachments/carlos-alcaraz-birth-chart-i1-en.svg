    <text x="76" y="401.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="393.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Treat Exact Degree as Provisional</text>
  <text x="116" y="415.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A shift in the recorded birth time can slide the Midheaven and weaken the</text>
  <text x="116" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">conjunction</text>
