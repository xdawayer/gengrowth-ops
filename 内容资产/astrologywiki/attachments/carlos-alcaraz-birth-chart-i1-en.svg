  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Confirm the Taurus Sun</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Earthy, fixed, built for endurance rather than quick bursts</text>
  <circle cx="76" cy="259" r="20.0" fill="url(#carlosalcarazbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="259" r="15" fill="url(#carlosalcarazbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
