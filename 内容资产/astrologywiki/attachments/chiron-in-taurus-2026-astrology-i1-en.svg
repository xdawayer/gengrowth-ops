  <text x="116" y="315.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Treat 2026 as Preview</text>
  <text x="116" y="337.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The June–September window is first contact with the theme, not the full chapter</text>
