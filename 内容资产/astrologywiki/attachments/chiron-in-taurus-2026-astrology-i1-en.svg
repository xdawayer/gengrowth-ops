  <text x="116" y="457.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Revisit the theme across years as Chiron moves through Taurus to observe what</text>
  <text x="116" y="475.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">shifts</text>
