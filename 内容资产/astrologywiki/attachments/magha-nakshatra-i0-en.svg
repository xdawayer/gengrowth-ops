    <circle cx="76" cy="181" r="15" fill="url(#maghanakshatra0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="176.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="185.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="177.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Note Ketu's Rulership</text>
  <text x="116" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Read the placement through lineage and the past, not raw ambition</text>
  <circle cx="76" cy="241" r="20.0" fill="url(#maghanakshatra0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="241" r="15" fill="url(#maghanakshatra0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="236.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="245.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="237.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Bring in the Pitrs</text>
  <text x="116" y="259.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Ask what family legacy, name, or inheritance the chart asks to honor</text>
  <circle cx="76" cy="301" r="20.0" fill="url(#maghanakshatra0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="301" r="15" fill="url(#maghanakshatra0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="296.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="305.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="297.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Hold Ketu's Tension</text>
  <text x="116" y="319.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Duty alongside letting go — the core of the reading, not a flaw</text>
  <circle cx="76" cy="361" r="20.0" fill="url(#maghanakshatra0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="361" r="15" fill="url(#maghanakshatra0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="356.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="365.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="357.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Avoid Shortcuts</text>
  <text x="116" y="379.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Authority received and reckoned with, not merely a 'natural leader'</text>
