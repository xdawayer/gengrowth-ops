    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Word Narrows</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">You start with &quot;stressed&quot; and arrive at a specific, contextualized feeling as</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">you write</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#emotionjournal1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#emotionjournal1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Context Attaches</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The feeling lands on a who, when, or where — not just a floating state</text>
  <circle cx="76" cy="259" r="20.0" fill="url(#emotionjournal1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="259" r="15" fill="url(#emotionjournal1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="254.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="263.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="255.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Charge Softens</text>
  <text x="116" y="277.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">After naming, the feeling loses some grip — the small release Lieberman</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">described</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#emotionjournal1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#emotionjournal1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="332.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="341.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="333.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Repeats Emerge</text>
  <text x="116" y="355.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Reading back a week, the same precise label surfaces across different</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">situations</text>
