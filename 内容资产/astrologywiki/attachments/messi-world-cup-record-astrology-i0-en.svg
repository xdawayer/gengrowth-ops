    <circle cx="76" cy="241" r="15" fill="url(#messiworldcuprecordastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="236.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="245.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="237.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Treat the arc as Saturn-paced</text>
  <text x="116" y="259.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A 16-year apprenticeship, more than half of Saturn's ~29.4-year cycle</text>
  <circle cx="76" cy="301" r="20.0" fill="url(#messiworldcuprecordastrology0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="301" r="15" fill="url(#messiworldcuprecordastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
