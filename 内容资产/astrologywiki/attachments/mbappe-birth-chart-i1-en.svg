  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Find the Sun sign and its ruling planet</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">For a Sagittarius Sun, the ruler is Jupiter</text>
  <circle cx="76" cy="181" r="20.0" fill="url(#mbappebirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="181" r="15" fill="url(#mbappebirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="176.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="185.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="177.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Track where transiting Jupiter sits</text>
  <text x="116" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Its element and angles to the natal Sun time the chart's high-visibility</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">windows</text>
  <circle cx="76" cy="259" r="20.0" fill="url(#mbappebirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="259" r="15" fill="url(#mbappebirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="254.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="263.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="255.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Note the Leo ingress on June 30, 2026</text>
  <text x="116" y="277.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Jupiter joins the Sun's fire family as a supportive backdrop for the later</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">rounds</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#mbappebirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#mbappebirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="332.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="341.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="333.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Treat time-sensitive points as provisional</text>
  <text x="116" y="355.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Keep the Ascendant and Moon's exact degree provisional until a birth time is</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">confirmed</text>
  <circle cx="76" cy="415" r="20.0" fill="url(#mbappebirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="415" r="15" fill="url(#mbappebirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="410.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="419.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="411.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Read each transit as a window, not a fixed outcome</text>
  <text x="116" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A window still has to be lived — the chart frames timing, not verdicts</text>
