    <circle cx="76" cy="277" r="15" fill="url(#germanyworldcupplayersbirthchart20260en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 3: Note Transit Context</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Record the simple 2026 transit per player without over-reading it as a result</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#germanyworldcupplayersbirthchart20260en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#germanyworldcupplayersbirthchart20260en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="332.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="341.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="333.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 4: Find the Collective Thread</text>
  <text x="116" y="355.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Kimmich's Aquarius Sun echoes the DFB founding chart of 28 January 1900, also</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Aquarius</text>
