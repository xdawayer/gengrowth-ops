  <text x="132" y="415.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 4</text>
  <text x="132" y="438.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Hold Saturn in Aries as Symbolic Backdrop</text>
  <text x="132" y="461.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Saturn transits Aries 2025–2028, squaring natal Capricorn — a multi-year arc of</text>
  <text x="132" y="478.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">earned thresholds, read as theme only, never as match verdict</text>
