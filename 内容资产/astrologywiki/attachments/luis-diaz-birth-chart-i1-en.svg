    <circle cx="92" cy="311" r="8" fill="url(#luisdiazbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="308.8" r="4.8" fill="#ffffff" opacity="0.10"/>
