  <text x="116" y="237.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Name the shared archetype</text>
  <text x="116" y="259.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Cancer as home, memory, and protective loyalty, a reflective theme</text>
  <circle cx="76" cy="301" r="20.0" fill="url(#cancerzodiacworldcup20261en-glow)" opacity="0.5"/>
    <circle cx="76" cy="301" r="15" fill="url(#cancerzodiacworldcup20261en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
