  <text x="116" y="177.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Gather the cohort by Sun sign</text>
  <text x="116" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Verified dates: Bellingham 29 Jun 2003, Messi 24 Jun 1987, Haaland 21 Jul 2000</text>
