  <text x="132" y="118.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 1</text>
  <text x="132" y="141.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Anchor the Verified Fact</text>
  <text x="132" y="164.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">3 September 1996 in Épinay-sous-Sénart, France fixes the Sun at roughly 11 degrees</text>
  <text x="132" y="181.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">of Virgo — the only placement a verified date alone can pin down</text>
  <circle cx="92" cy="212" r="13.0" fill="url(#yoanewissabirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="212" r="8" fill="url(#yoanewissabirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="209.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 208.0 L 92.6 211.4 L 96.0 212 L 92.6 212.6 L 92 216.0 L 91.4 212.6 L 88.0 212 L 91.4 211.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="217.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 2</text>
  <text x="132" y="240.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Flag What Is Unknown</text>
  <text x="132" y="263.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">No public birth time means Moon sign, Ascendant, and houses stay unverified —</text>
  <text x="132" y="280.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">treat them as open, never fill the gap with guesses</text>
  <circle cx="92" cy="311" r="13.0" fill="url(#yoanewissabirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="311" r="8" fill="url(#yoanewissabirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="308.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 307.0 L 92.6 310.4 L 96.0 311 L 92.6 311.6 L 92 315.0 L 91.4 311.6 L 88.0 311 L 91.4 310.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="316.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 3</text>
  <text x="132" y="339.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Read the Virgo Arc as Incremental Mastery</text>
  <text x="132" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Mercury-ruled adaptability, mutable-earth precision, a journeyman path built</text>
  <text x="132" y="379.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">through craft and service — born in France, representing DR Congo, moving from</text>
  <text x="132" y="396.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Brentford to Newcastle</text>
  <circle cx="92" cy="427" r="13.0" fill="url(#yoanewissabirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="427" r="8" fill="url(#yoanewissabirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="424.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 423.0 L 92.6 426.4 L 96.0 427 L 92.6 427.6 L 92 431.0 L 91.4 427.6 L 88.0 427 L 91.4 426.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="432.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 4</text>
  <text x="132" y="455.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Hold the Historic Backdrop as Symbolic Context</text>
  <text x="132" y="478.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">DR Congo's WC 2026 qualification — their second-ever World Cup appearance — is</text>
  <text x="132" y="495.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">verified fact, not prediction; the Virgo-Sun theme of patient preparation pairs</text>
  <text x="132" y="512.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">naturally with this collective milestone</text>
  <path d="M 202.22749999999988 532.4 L 202.6 534.6 L 204.8 535 L 202.6 535.4 L 202.22749999999988 537.6 L 201.8 535.4 L 199.6 535 L 201.8 534.6 Z" fill="#d4af6a" opacity="0.5"/>
  <text x="380" y="539" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11.5" fill="#7b738f">A self-reflection framework — tendencies, not predictions</text>
