  <text x="380" y="326.0" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" font-weight="700" letter-spacing="0.3" fill="#f3effb">Accurate Interpretation</text>
  <path d="M 70 355.8 L 70.5 358.5 L 73.2 359 L 70.5 359.5 L 70 362.2 L 69.5 359.5 L 66.8 359 L 69.5 358.5 Z" fill="#d4af6a" opacity="0.8"/>
  <text x="84" y="364.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">Teardrop is Rudra's cleansing rain — the washing-clean phase of a renewal</text>
  <text x="84" y="383.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">cycle</text>
  <path d="M 70 403.8 L 70.5 406.5 L 73.2 407 L 70.5 407.5 L 70 410.2 L 69.5 407.5 L 66.8 407 L 69.5 406.5 Z" fill="#d4af6a" opacity="0.8"/>
  <text x="84" y="412.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">Rahu amplifies and intensifies; overwhelm and insight share the same</text>
  <text x="84" y="431.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">amplifying source</text>
  <path d="M 70 451.8 L 70.5 454.5 L 73.2 455 L 70.5 455.5 L 70 458.2 L 69.5 455.5 L 66.8 455 L 69.5 454.5 Z" fill="#d4af6a" opacity="0.8"/>
  <text x="84" y="460.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">Rudra dissolves the stagnant so renewal can follow — functional, not</text>
  <text x="84" y="479.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">purposeless destruction</text>
  <path d="M 70 499.8 L 70.5 502.5 L 73.2 503 L 70.5 503.5 L 70 506.2 L 69.5 503.5 L 66.8 503 L 69.5 502.5 Z" fill="#d4af6a" opacity="0.8"/>
  <text x="84" y="508.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">Intensity is the gateway; the cycle reaches clarity through pressure, not</text>
  <text x="84" y="527.0" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#a59cc0">around it</text>
