    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">~30 June — Jupiter enters Leo</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Jupiter leaves Cancer and enters Leo as the knockout stage begins; the symbolic</text>
  <text x="116" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">amplification of his Sun sign passes, and the backdrop shifts</text>
  <circle cx="76" cy="277" r="20.0" fill="url(#jamesrodriguezbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="277" r="15" fill="url(#jamesrodriguezbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">12 July — his 35th birthday, solar return</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Rodriguez's solar return falls under Jupiter in Leo rather than Cancer; the</text>
  <text x="116" y="313.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">veteran threshold and a shifted symbolic backdrop coincide</text>
  <circle cx="76" cy="355" r="20.0" fill="url(#jamesrodriguezbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="355" r="15" fill="url(#jamesrodriguezbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="350.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="359.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="351.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">19 July — final at MetLife Stadium</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The World Cup final in New Jersey closes the tournament window with Jupiter</text>
  <text x="116" y="391.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">firmly in Leo; hold all of it as symbolic timing, not a result forecast</text>
