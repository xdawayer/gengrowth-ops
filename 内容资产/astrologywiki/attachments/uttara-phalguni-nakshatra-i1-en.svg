    <circle cx="76" cy="121" r="15" fill="url(#uttaraphalguninakshatra1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="116.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Leo-Virgo Position</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Late Leo = visible authority; early Virgo = quiet, exacting service</text>
  <circle cx="76" cy="181" r="20.0" fill="url(#uttaraphalguninakshatra1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="181" r="15" fill="url(#uttaraphalguninakshatra1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="176.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="185.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="177.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Sun as Ruler</text>
  <text x="116" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Ask where confidence and self-direction want to express themselves in the chart</text>
  <circle cx="76" cy="241" r="20.0" fill="url(#uttaraphalguninakshatra1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="241" r="15" fill="url(#uttaraphalguninakshatra1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="236.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="245.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="237.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Aryaman's Theme</text>
  <text x="116" y="259.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Where are you the one others rely on by agreement, not just affection?</text>
  <circle cx="76" cy="301" r="20.0" fill="url(#uttaraphalguninakshatra1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="301" r="15" fill="url(#uttaraphalguninakshatra1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="296.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="305.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="297.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Contrast Purva Phalguni</text>
  <text x="116" y="319.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Separate free enjoyment from committed duty — don't blend them</text>
  <circle cx="76" cy="361" r="20.0" fill="url(#uttaraphalguninakshatra1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="361" r="15" fill="url(#uttaraphalguninakshatra1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="356.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="365.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="357.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Patronage as Question</text>
  <text x="116" y="379.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Treat the patronage archetype as a reliability question, never a fixed label</text>
