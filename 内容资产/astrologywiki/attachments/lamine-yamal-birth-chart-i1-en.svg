  <text x="116" y="375.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Read Each Transit as a Chapter</text>
  <text x="116" y="397.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A chapter still to be lived, not a fixed outcome</text>
