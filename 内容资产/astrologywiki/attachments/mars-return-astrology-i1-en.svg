  <text x="116" y="435.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Use as Planning Prompt</text>
  <text x="116" y="457.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Treat the reading as a two-year planning prompt, then revisit at the next</text>
  <text x="116" y="475.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">return</text>
