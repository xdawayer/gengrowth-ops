  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">1. Find Rahu's Sign &amp; House</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The arena of desire and ambition the chart is most drawn to grow into</text>
  <circle cx="76" cy="181" r="20.0" fill="url(#rahuandketuastrology0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="181" r="15" fill="url(#rahuandketuastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="176.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="185.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="177.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">2. Read Ketu Directly Opposite</text>
  <text x="116" y="199.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The south node as the domain of inherited ease the chart can lean on or hide</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">behind</text>
  <circle cx="76" cy="259" r="20.0" fill="url(#rahuandketuastrology0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="259" r="15" fill="url(#rahuandketuastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="254.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="263.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="255.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">3. Treat the Pair as One Axis</text>
  <text x="116" y="277.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Progress means leaning toward Rahu's frontier without abandoning Ketu's</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">hard-won ground</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#rahuandketuastrology0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#rahuandketuastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="332.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="341.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="333.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">4. Note Dasha Timing</text>
  <text x="116" y="355.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Dasha periods activating either node are among the most consequential phases in</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Jyotish</text>
  <circle cx="76" cy="415" r="20.0" fill="url(#rahuandketuastrology0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="415" r="15" fill="url(#rahuandketuastrology0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="410.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="419.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="411.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">5. Map onto Zodiac Signs</text>
  <text x="116" y="433.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The sign context gives the abstract polarity the texture of an actual sign's</text>
  <text x="116" y="451.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">qualities</text>
