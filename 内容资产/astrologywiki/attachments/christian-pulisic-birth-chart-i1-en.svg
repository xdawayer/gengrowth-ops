  <text x="132" y="118.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 1</text>
  <text x="132" y="141.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Anchor the verified date</text>
  <text x="132" y="164.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">18 September 1998 in Hershey, Pennsylvania fixes the Sun at roughly 25 degrees of</text>
  <text x="132" y="181.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Virgo — the one hard fact the entire reading rests on</text>
  <circle cx="92" cy="212" r="13.0" fill="url(#christianpulisicbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="212" r="8" fill="url(#christianpulisicbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="209.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 208.0 L 92.6 211.4 L 96.0 212 L 92.6 212.6 L 92 216.0 L 91.4 212.6 L 88.0 212 L 91.4 211.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="217.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 2</text>
  <text x="132" y="240.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Flag the unknown birth time</text>
  <text x="132" y="263.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">No public birth time means the Moon sign, Ascendant, and houses are unverified —</text>
  <text x="132" y="280.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">state this plainly rather than inventing the gap</text>
  <circle cx="92" cy="311" r="13.0" fill="url(#christianpulisicbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="311" r="8" fill="url(#christianpulisicbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="308.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 307.0 L 92.6 310.4 L 96.0 311 L 92.6 311.6 L 92 315.0 L 91.4 311.6 L 88.0 311 L 91.4 310.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="316.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 3</text>
  <text x="132" y="339.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Read the Virgo arc as precision and adaptability</text>
  <text x="132" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Virgo is a mutable earth sign ruled by Mercury: its symbolism maps to craft,</text>
  <text x="132" y="379.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">positional versatility across winger, attacking midfielder, and forward — theme,</text>
  <text x="132" y="396.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">not destiny</text>
  <circle cx="92" cy="427" r="13.0" fill="url(#christianpulisicbirthchart1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="427" r="8" fill="url(#christianpulisicbirthchart1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="424.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 423.0 L 92.6 426.4 L 96.0 427 L 92.6 427.6 L 92 431.0 L 91.4 427.6 L 88.0 427 L 91.4 426.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="432.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Step 4</text>
  <text x="132" y="455.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Hold Saturn in Aries as collective backdrop</text>
  <text x="132" y="478.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Saturn transits Aries 2025–2028: a broad structural backdrop shared by everyone</text>
  <text x="132" y="495.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">under this sky, not a personal marker for one player — hold it all as symbolism,</text>
  <text x="132" y="512.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">keep results open</text>
