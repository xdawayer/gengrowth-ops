    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">This Transit Is My Saturn Return</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">It is a Return only if your natal Saturn is in Aries. For everyone else it is an</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">ordinary house transit — demanding, but not the once-in-29-years milestone.</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#saturninaries20261en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#saturninaries20261en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Saturn in Aries Means Bad Luck for Aries People</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Sun-sign Aries readers feel the first-house version most directly, but the</text>
  <text x="116" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">transit is a structuring pressure on initiative, not a sentence. The same dema…</text>
  <circle cx="76" cy="277" r="20.0" fill="url(#saturninaries20261en-glow)" opacity="0.5"/>
    <circle cx="76" cy="277" r="15" fill="url(#saturninaries20261en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">The Whole Period Is One Long Hardship</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The passage moves through retrograde and direct phases with distinct peaks, so</text>
  <text x="116" y="313.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">the pressure pulses rather than holding flat, with a clear exit near April 202…</text>
  <circle cx="76" cy="355" r="20.0" fill="url(#saturninaries20261en-glow)" opacity="0.5"/>
    <circle cx="76" cy="355" r="15" fill="url(#saturninaries20261en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="350.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="359.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="351.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">You Read Your Own Transit Differently</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The method is identical for anyone — locate the Aries house, read its domain,</text>
  <text x="116" y="391.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">then ask what structure it lacks. No special-case reading exists for your own …</text>
  <path d="M 202.22749999999988 416.4 L 202.6 418.6 L 204.8 419 L 202.6 419.4 L 202.22749999999988 421.6 L 201.8 419.4 L 199.6 419 L 201.8 418.6 Z" fill="#d4af6a" opacity="0.5"/>
  <text x="380" y="423" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11.5" fill="#7b738f">A self-reflection framework — tendencies, not predictions</text>
