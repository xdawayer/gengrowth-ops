  <text x="132" y="118.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Early June</text>
  <text x="132" y="141.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Gemini Phase</text>
  <text x="132" y="164.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Air-sign season favoring talk, curiosity, and visibility — you reach out, post,</text>
  <text x="132" y="181.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">and want to be seen</text>
  <circle cx="92" cy="212" r="13.0" fill="url(#pridemonthastrology1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="212" r="8" fill="url(#pridemonthastrology1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="209.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 208.0 L 92.6 211.4 L 96.0 212 L 92.6 212.6 L 92 216.0 L 91.4 212.6 L 88.0 212 L 91.4 211.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="217.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">June 20–21</text>
  <text x="132" y="240.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Solstice Hinge</text>
  <text x="132" y="263.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">The Sun reaches its northernmost point and the season changes element — energy swings from outward to</text>
  <text x="132" y="280.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">inward</text>
  <circle cx="92" cy="311" r="13.0" fill="url(#pridemonthastrology1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="311" r="8" fill="url(#pridemonthastrology1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="308.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 307.0 L 92.6 310.4 L 96.0 311 L 92.6 311.6 L 92 315.0 L 91.4 311.6 L 88.0 311 L 91.4 310.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="316.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Late June</text>
  <text x="132" y="339.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Cancer Phase</text>
  <text x="132" y="362.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Water-sign season favoring care, home, and belonging — you crave rest, family, and</text>
  <text x="132" y="379.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">small circles</text>
  <circle cx="92" cy="410" r="13.0" fill="url(#pridemonthastrology1en-glow)" opacity="0.5"/>
    <circle cx="92" cy="410" r="8" fill="url(#pridemonthastrology1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="92" cy="407.8" r="4.8" fill="#ffffff" opacity="0.10"/>
    <path d="M 92 406.0 L 92.6 409.4 L 96.0 410 L 92.6 410.6 L 92 414.0 L 91.4 410.6 L 88.0 410 L 91.4 409.4 Z" fill="#3a2c12" opacity="0.85"/>
  <text x="132" y="415.0" font-family="Georgia, 'Times New Roman', serif" font-size="19" font-weight="700" letter-spacing="0.4" fill="#f6e6bf">Full Month</text>
  <text x="132" y="438.0" font-family="Georgia, 'Times New Roman', serif" font-size="20.5" fill="#f3effb">Sun–Venus Tone</text>
  <text x="132" y="461.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">Expression meeting warmth and relational value — pride in being both seen and</text>
  <text x="132" y="478.0" font-family="Helvetica, Arial, sans-serif" font-size="14.5" fill="#a59cc0">cared for</text>
  <path d="M 202.22749999999988 498.4 L 202.6 500.6 L 204.8 501 L 202.6 501.4 L 202.22749999999988 503.6 L 201.8 501.4 L 199.6 501 L 201.8 500.6 Z" fill="#d4af6a" opacity="0.5"/>
  <text x="380" y="505" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="11.5" fill="#7b738f">A self-reflection framework — tendencies, not predictions</text>
