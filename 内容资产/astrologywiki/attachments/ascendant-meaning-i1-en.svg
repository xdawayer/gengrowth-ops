  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Note Sign &amp; Degree</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">That sign and degree is your rising sign and your first house cusp</text>
  <circle cx="76" cy="337" r="20.0" fill="url(#ascendantmeaning1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="337" r="15" fill="url(#ascendantmeaning1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
