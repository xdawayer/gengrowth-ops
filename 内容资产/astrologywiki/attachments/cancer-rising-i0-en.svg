    <text x="76" y="125.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">1</text>
  <text x="116" y="117.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 1</text>
  <text x="116" y="139.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Confirm the first house is in Cancer — this places the Moon as the ruler of the</text>
  <text x="116" y="157.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">whole chart</text>
  <circle cx="76" cy="199" r="20.0" fill="url(#cancerrising0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="199" r="15" fill="url(#cancerrising0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="194.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="203.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">2</text>
  <text x="116" y="195.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 2</text>
  <text x="116" y="217.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Find the Moon's sign — it tints the Cancer mask (a Capricorn Moon reads cooler,</text>
  <text x="116" y="235.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">a Leo Moon reads warmer)</text>
  <circle cx="76" cy="277" r="20.0" fill="url(#cancerrising0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="277" r="15" fill="url(#cancerrising0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 3</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Locate the Moon by house — the life area where the protective, caretaking</text>
  <text x="116" y="313.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">instinct most visibly surfaces</text>
  <circle cx="76" cy="355" r="20.0" fill="url(#cancerrising0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="355" r="15" fill="url(#cancerrising0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="350.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="359.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="351.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 4</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Note the Moon's main aspects — tense aspects make the outer self more</text>
  <text x="116" y="391.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">defensive, soft aspects make it more openly warm</text>
  <circle cx="76" cy="433" r="20.0" fill="url(#cancerrising0en-glow)" opacity="0.5"/>
    <circle cx="76" cy="433" r="15" fill="url(#cancerrising0en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="428.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="437.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="429.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 5</text>
  <text x="116" y="451.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Read the fourth house — home and roots quietly feed every public interaction</text>
  <text x="116" y="469.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">for Cancer rising</text>
