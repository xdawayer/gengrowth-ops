    <circle cx="76" cy="379" r="15" fill="url(#virgorising1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="374.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="383.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="375.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Step 5</text>
  <text x="116" y="397.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Read the rest of the chart for contrast — the Virgo doorway is not the whole</text>
  <text x="116" y="415.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">person</text>
