    <circle cx="76" cy="277" r="15" fill="url(#scotlandworldcup2026astrologysaturnreturn1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="272.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="281.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">3</text>
  <text x="116" y="273.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Mark the Threshold</text>
  <text x="116" y="295.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">The 4-2 win over Denmark on 18 November 2025 sealed qualification: the doorway</text>
  <text x="116" y="313.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">reached and earned</text>
  <circle cx="76" cy="355" r="20.0" fill="url(#scotlandworldcup2026astrologysaturnreturn1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="355" r="15" fill="url(#scotlandworldcup2026astrologysaturnreturn1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="350.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="359.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">4</text>
  <text x="116" y="351.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Map Saturn in Aries</text>
  <text x="116" y="373.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">Saturn in Aries (2025–28): cardinal sign of fresh starts mirrors the symbolism</text>
  <text x="116" y="391.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">of beginning again on merit</text>
  <circle cx="76" cy="433" r="20.0" fill="url(#scotlandworldcup2026astrologysaturnreturn1en-glow)" opacity="0.5"/>
    <circle cx="76" cy="433" r="15" fill="url(#scotlandworldcup2026astrologysaturnreturn1en-foil)" stroke="#f6e6bf" stroke-opacity="0.5" stroke-width="0.8"/>
    <circle cx="76" cy="428.8" r="9.0" fill="#ffffff" opacity="0.10"/>
    <text x="76" y="437.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="700" fill="#3a2c12">5</text>
  <text x="116" y="429.0" font-family="Georgia, 'Times New Roman', serif" font-size="22" letter-spacing="0.3" fill="#f3effb">Hold the Archetype Open</text>
  <text x="116" y="451.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">A season of maturity and earned return, not a fixed result: leave the outcome</text>
  <text x="116" y="469.0" font-family="Helvetica, Arial, sans-serif" font-size="15.5" fill="#a59cc0">open for the squad</text>
