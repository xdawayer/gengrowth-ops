<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GenGrowth 外链生成工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f6;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --text: #1d2520;
      --muted: #5f6b64;
      --line: #d9e0da;
      --brand: #2f6f5e;
      --brand-strong: #245749;
      --warn: #9b4d18;
      --danger: #a33b3b;
      --focus: #6a8fdb;
      --shadow: 0 10px 28px rgba(29, 37, 32, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 750;
    }

    .domain-pill {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: var(--surface);
      color: var(--muted);
      font-size: 13px;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(360px, 0.82fr);
      gap: 16px;
      align-items: start;
    }

    section {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
      border-radius: 8px 8px 0 0;
      font-size: 14px;
      font-weight: 700;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    label {
      display: grid;
      gap: 7px;
      min-width: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 650;
    }

    label.full {
      grid-column: 1 / -1;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      letter-spacing: 0;
    }

    input,
    select {
      min-height: 40px;
      padding: 9px 10px;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      padding: 11px;
      line-height: 1.5;
      word-break: break-all;
    }

    input:focus,
    select:focus,
    textarea:focus,
    button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding-top: 2px;
    }

    button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 12px;
      background: var(--brand);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-strong);
    }

    button.secondary {
      background: #fff;
      color: var(--brand);
      border-color: var(--line);
    }

    button.secondary:hover {
      background: var(--surface-soft);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
    }

    .output {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .status.ok {
      color: var(--brand-strong);
    }

    .status.warn {
      color: var(--warn);
    }

    .status.error {
      color: var(--danger);
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    @media (max-width: 860px) {
      main {
        width: min(100vw - 20px, 680px);
        padding-top: 18px;
      }

      header,
      .workspace,
      form {
        display: block;
      }

      header > * + *,
      .workspace > * + *,
      form > * + * {
        margin-top: 14px;
      }

    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>GenGrowth 外链生成工具</h1>
      <div class="domain-pill">仅允许 gengrowth.ai / www.gengrowth.ai</div>
    </header>

    <div class="workspace">
      <section aria-labelledby="input-title">
        <div class="panel-title" id="input-title">
          <span>参数</span>
          <span>UTM / 短链</span>
        </div>
        <form id="link-form">
          <label class="full">
            落地页
            <input id="landing-url" name="landingUrl" value="https://www.gengrowth.ai/" autocomplete="off">
          </label>

          <label>
            utm_source
            <input id="utm-source" name="source" autocomplete="off">
          </label>

          <label>
            utm_medium
            <select id="utm-medium" name="medium">
              <option value="" selected>留空</option>
              <option value="backlink">backlink</option>
              <option value="social">social</option>
              <option value="kol">kol</option>
              <option value="newsletter">newsletter</option>
            </select>
          </label>

          <label>
            utm_campaign / cluster_id
            <input id="utm-campaign" name="campaign" autocomplete="off">
          </label>

          <label>
            utm_content / action_id
            <input id="utm-content" name="content" autocomplete="off">
          </label>

          <div class="actions">
            <button type="submit">生成链接</button>
            <button class="secondary" type="reset">重置</button>
          </div>
        </form>
      </section>

      <section aria-labelledby="output-title">
        <div class="panel-title" id="output-title">
          <span>结果</span>
          <span id="result-state">待生成</span>
        </div>
        <div class="output">
          <label>
            长链接
            <textarea id="long-url" readonly spellcheck="false"></textarea>
          </label>
          <div class="row-actions">
            <button class="secondary" type="button" data-copy="long-url">复制长链接</button>
            <button class="secondary" type="button" data-open="long-url">打开长链接</button>
          </div>

          <label>
            自有短链接
            <textarea id="short-url" readonly spellcheck="false"></textarea>
          </label>
          <div class="row-actions">
            <button class="secondary" type="button" data-copy="short-url">复制短链接</button>
            <button class="secondary" type="button" data-open="short-url">打开短链接</button>
          </div>

          <div class="status" id="status"></div>
        </div>
      </section>
    </div>
  </main>

  <script type="application/json" id="reserved-code-registry" hidden>[]</script>

  <script id="link-attribution-core">
    (function () {
      const GENGROWTH_HOSTS = new Set(['gengrowth.ai', 'www.gengrowth.ai']);
      const OWNED_SHORT_BASE_URL = 'https://www.gengrowth.ai/';

      function valueOf(input, label) {
        const value = String(input || '').trim();
        if (!value) {
          throw new Error(`${label} 不能为空`);
        }
        return value;
      }

      function optionalValue(input) {
        return String(input || '').trim();
      }

      function normalizeLandingUrl(rawLandingUrl) {
        let value = valueOf(rawLandingUrl, '落地页');
        if (value.startsWith('/')) {
          value = `https://www.gengrowth.ai${value}`;
        } else if (!/^https?:\/\//i.test(value)) {
          value = `https://${value}`;
        }

        const url = new URL(value);
        const host = url.hostname.toLowerCase();
        if (!GENGROWTH_HOSTS.has(host)) {
          throw new Error('落地页必须是 gengrowth.ai 或 www.gengrowth.ai');
        }

        url.protocol = 'https:';
        return url;
      }

      function buildLongUrl(params) {
        const url = normalizeLandingUrl(params.landingUrl);
        const utmPairs = [
          ['utm_source', optionalValue(params.source)],
          ['utm_medium', optionalValue(params.medium)],
          ['utm_campaign', optionalValue(params.campaign)],
          ['utm_content', optionalValue(params.content)],
        ];

        utmPairs.forEach(([key]) => url.searchParams.delete(key));
        utmPairs.forEach(([key, value]) => {
          if (value) {
            url.searchParams.set(key, value);
          }
        });

        return url.toString();
      }

      function slugifyActionPart(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/^https?:\/\//, '')
          .replace(/^www\./, '')
          .replace(/[^a-z0-9]+/g, '_')
          .replace(/^_+|_+$/g, '')
          .slice(0, 48);
      }

      function slugifyShortCode(value) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/^https?:\/\//, '')
          .replace(/^www\./, '')
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '')
          .slice(0, 60);
      }

      function addReservedCode(codes, value) {
        const code = slugifyShortCode(value);
        if (code) {
          codes.add(code);
        }
      }

      function parseReservedCodes(input) {
        const codes = new Set();
        if (!input) {
          return codes;
        }

        if (Array.isArray(input) || input instanceof Set) {
          input.forEach((value) => addReservedCode(codes, value));
          return codes;
        }

        const text = String(input);
        function addParsedValue(value) {
          if (typeof value === 'string') {
            addReservedCode(codes, value);
            return;
          }
          if (Array.isArray(value)) {
            value.forEach(addParsedValue);
            return;
          }
          if (value && typeof value === 'object') {
            addReservedCode(codes, value.code);
            addReservedCode(codes, value.short_url);
            addReservedCode(codes, value.clean_short_url);
          }
        }

        try {
          addParsedValue(JSON.parse(text));
        } catch {
          // Registry can also be pasted as loose text, URLs, or JSON snippets.
        }

        const shortUrlPattern = /https?:\/\/(?:www\.)?gengrowth\.ai\/(?:go\/)?([a-z0-9][a-z0-9-]*)/gi;
        let match = shortUrlPattern.exec(text);
        while (match) {
          addReservedCode(codes, match[1]);
          match = shortUrlPattern.exec(text);
        }

        const jsonCodePattern = /"code"\s*:\s*"([^"]+)"/gi;
        match = jsonCodePattern.exec(text);
        while (match) {
          addReservedCode(codes, match[1]);
          match = jsonCodePattern.exec(text);
        }

        text.split(/\r?\n/).forEach((line) => {
          const trimmed = line.trim();
          try {
            addParsedValue(JSON.parse(trimmed));
            return;
          } catch {
            // Fall through to bare-code parsing.
          }
          if (!trimmed || /[{}":/]/.test(trimmed)) {
            return;
          }
          addReservedCode(codes, trimmed);
        });

        return codes;
      }

      function makeUniqueShortCode(baseCode, reservedCodes) {
        const reserved = parseReservedCodes(reservedCodes);
        const base = slugifyShortCode(baseCode);
        if (!base) {
          throw new Error('短码不能为空');
        }

        if (!reserved.has(base)) {
          return base;
        }

        let index = 2;
        let candidate = `${base}-${index}`;
        while (reserved.has(candidate)) {
          index += 1;
          candidate = `${base}-${index}`;
        }
        return candidate;
      }

      function normalizeUniqueSeed(value, maxLength = 16) {
        return String(value || '')
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '')
          .slice(0, maxLength);
      }

      function createRandomPart(length) {
        const alphabet = 'abcdefghijklmnopqrstuvwxyz0123456789';
        if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
          const values = new Uint8Array(length);
          crypto.getRandomValues(values);
          return Array.from(values, (value) => alphabet[value % alphabet.length]).join('');
        }

        let result = '';
        while (result.length < length) {
          result += Math.random().toString(36).slice(2);
        }
        return result.slice(0, length);
      }

      function createUniqueSeed() {
        const timePart = Date.now().toString(36).slice(-6);
        const randomPart = createRandomPart(6);
        return normalizeUniqueSeed(`${timePart}${randomPart}`) || 'auto';
      }

      function buildOwnedShortCode(params) {
        const code = normalizeUniqueSeed(params.uniqueSeed) || createUniqueSeed();
        return makeUniqueShortCode(code, params.reservedCodes);
      }

      function buildOwnedShortUrl(params) {
        const destination = normalizeLandingUrl(params.destinationUrl || params.landingUrl).toString();
        return `${OWNED_SHORT_BASE_URL}${buildOwnedShortCode({
          ...params,
          destinationUrl: destination,
        })}`;
      }

      function buildRedirectMapping({ shortUrl, longUrl }) {
        const short = new URL(valueOf(shortUrl, '短链接'));
        const long = valueOf(longUrl, '长链接');
        short.search = '';
        return {
          code: short.pathname.split('/').filter(Boolean).pop(),
          short_url: valueOf(shortUrl, '短链接'),
          clean_short_url: short.toString(),
          destination_url: long,
          redirect_status: 302,
        };
      }

      function toDisplayShortUrl(shortUrl) {
        const value = valueOf(shortUrl, '短链接');
        try {
          const url = new URL(value);
          const host = url.hostname.replace(/^www\./, '');
          const parts = url.pathname.split('/').filter(Boolean);
          const code = parts[0] === 'go' ? parts[1] : parts[0];
          return code ? `${host}/${code}` : host;
        } catch {
          return value;
        }
      }

      function buildActionId({ medium, source, date }) {
        const channel = slugifyActionPart(medium || 'link') || 'link';
        const sourcePart = slugifyActionPart(source || 'source') || 'source';
        const day = String(date || '').replace(/\D/g, '').slice(0, 8);
        return `act_${channel}_${sourcePart}_${day || 'yyyymmdd'}`;
      }

      window.LinkAttributionCore = {
        buildActionId,
        buildOwnedShortCode,
        buildOwnedShortUrl,
        createUniqueSeed,
        buildLongUrl,
        buildRedirectMapping,
        toDisplayShortUrl,
        normalizeLandingUrl,
        parseReservedCodes,
      };
    }());
  </script>

  <script>
    (function () {
      const core = window.LinkAttributionCore;
      const REDIRECT_REGISTRATION_ENDPOINT = 'https://www.gengrowth.ai/api/link-attribution/redirects?v=20260623';
      const form = document.getElementById('link-form');
      const state = document.getElementById('result-state');
      const status = document.getElementById('status');
      const longUrl = document.getElementById('long-url');
      const shortUrl = document.getElementById('short-url');
      const reservedCodeRegistry = document.getElementById('reserved-code-registry');

      function setStatus(message, type) {
        status.textContent = message || '';
        status.className = `status ${type || ''}`.trim();
      }

      function readableRegistrationError(payload, fallback) {
        const errorCode = payload?.code || payload?.error?.code;
        if (errorCode === 'code_conflict') {
          return '短码已被占用：系统会自动重试，请重新生成。';
        }
        if (errorCode === 'storage_unconfigured') {
          return '短链存储未配置：请先在 GenGrowth 生产环境配置 SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY，或 REDIS_URL，并确认短链映射表已创建。';
        }
        const message = payload?.error?.message || payload?.error || payload?.message;
        return typeof message === 'string' && message.trim() ? message : fallback;
      }

      function formData() {
        const data = new FormData(form);
        return {
          landingUrl: data.get('landingUrl'),
          source: data.get('source'),
          medium: data.get('medium'),
          campaign: data.get('campaign'),
          content: data.get('content'),
        };
      }

      function readReservedCodeRegistry() {
        return reservedCodeRegistry?.textContent || '';
      }

      function appendReservedCodeToRegistry(code) {
        if (!reservedCodeRegistry || !code) {
          return;
        }
        const codes = core.parseReservedCodes(readReservedCodeRegistry());
        if (codes.has(code)) {
          return;
        }
        codes.add(code);
        reservedCodeRegistry.textContent = JSON.stringify([...codes].sort());
      }

      function setShortUrlValue(fullUrl) {
        shortUrl.dataset.fullUrl = fullUrl || '';
        shortUrl.value = fullUrl ? core.toDisplayShortUrl(fullUrl) : '';
      }

      function valueForCopy(target) {
        return String(target?.value || '').trim();
      }

      function valueForOpen(target) {
        return String(target?.dataset?.fullUrl || target?.value || '').trim();
      }

      async function registerRedirectMapping(mapping) {
        const response = await fetch(REDIRECT_REGISTRATION_ENDPOINT, {
          method: 'POST',
          mode: 'cors',
          credentials: 'omit',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            code: mapping.code,
            destination_url: mapping.destination_url,
          }),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          const message = readableRegistrationError(payload, '短链提交 GenGrowth 失败，请稍后重试。');
          const error = new Error(message);
          error.code = payload?.code || payload?.error?.code;
          throw error;
        }
        return payload.data || payload;
      }

      async function registerWithGlobalConflictRetry(data, generatedLongUrl) {
        const maxAttempts = 3;
        for (let attempt = 0; attempt < maxAttempts; attempt += 1) {
          const generatedShortUrl = core.buildOwnedShortUrl({
            ...data,
            reservedCodes: readReservedCodeRegistry(),
            uniqueSeed: attempt === 0 ? undefined : core.createUniqueSeed(),
            destinationUrl: generatedLongUrl,
          });
          const mapping = core.buildRedirectMapping({
            shortUrl: generatedShortUrl,
            longUrl: generatedLongUrl,
          });

          try {
            const registered = await registerRedirectMapping(mapping);
            appendReservedCodeToRegistry(mapping.code);
            return {
              mapping,
              registered,
            };
          } catch (error) {
            if (error.code === 'code_conflict') {
              appendReservedCodeToRegistry(mapping.code);
            }
            if (error.code === 'code_conflict' && attempt < maxAttempts - 1) {
              continue;
            }
            throw error;
          }
        }
        throw new Error('短码已被占用，请重新生成。');
      }

      async function generateLongLink() {
        const data = formData();
        const generatedLongUrl = core.buildLongUrl(data);
        longUrl.value = generatedLongUrl;
        setShortUrlValue('');
        state.textContent = '正在提交';
        setStatus('正在提交到 GenGrowth...', 'warn');
        const { mapping, registered } = await registerWithGlobalConflictRetry(data, generatedLongUrl);
        setShortUrlValue(registered.short_url || mapping.clean_short_url);
        state.textContent = '链接已生成';
        setStatus('已生成并提交到 GenGrowth，可直接复制或打开测试。', 'ok');
        return generatedLongUrl;
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await generateLongLink();
        } catch (error) {
          state.textContent = '生成失败';
          setStatus(error.message, 'error');
        }
      });

      document.querySelectorAll('[data-copy]').forEach((button) => {
        button.addEventListener('click', async () => {
          const target = document.getElementById(button.dataset.copy);
          const value = valueForCopy(target);
          if (!value) {
            setStatus('没有可复制的链接。', 'warn');
            return;
          }
          await navigator.clipboard.writeText(value);
          setStatus('已复制。', 'ok');
        });
      });

      document.querySelectorAll('[data-open]').forEach((button) => {
        button.addEventListener('click', () => {
          const target = document.getElementById(button.dataset.open);
          const value = valueForOpen(target);
          if (!value) {
            setStatus('没有可打开的链接。', 'warn');
            return;
          }
          window.open(value, '_blank', 'noopener,noreferrer');
          setStatus('已打开链接。', 'ok');
        });
      });

    }());
  </script>
</body>
</html>
