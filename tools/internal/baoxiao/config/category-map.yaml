# 报销类目 ↔ 会计科目 对照规则(业务输入,wzb / 财务填)
#
# classify 按列表顺序匹配:类目线索里出现任一 keyword 即归到该 category,
# 第一条命中即返回(优先级靠前的规则先匹配)。未命中 → "其他费用"(fallback)。
#
# !! category 必须与《报销表》「费用类型」单选项【完全一致】!!
# 真实表项(Lynne 飞书表):营销 / 商务送礼 / 差旅费 / 业务招待费 /
#                       交通费 / 办公费 / 福利费 / 其他费用 / 研发费用
#
# 优先级编排原则:
# - 差旅费 > 交通费:出差期间打车归差旅,纯市内出行归交通
# - 业务招待费 > 福利费:含"招待/宴请"明确归商务餐;员工自食归福利
# - 商务送礼 > 福利费:对外送礼 vs 对内员工福利,粗略按关键词区分
# 未明确时由 Lynne 在账本备注列人工裁决。

rules:
  - category: 差旅费
    keywords: [机票, 高铁, 火车, 酒店, 住宿, 出差, 民宿, 行程单, 客房]
  - category: 交通费
    keywords: [出租车, 滴滴, 网约车, 打车, 地铁, 公交, 高德, 曹操, 共享]
  - category: 业务招待费
    keywords: [招待, 宴请, 商务餐, 客户餐, 商务用餐, 接待, 酒家, 餐厅, 餐饮]
  - category: 商务送礼
    keywords: [送礼, 礼品, 礼物, 花篮, 鲜花, 花束, 摆饰, 茶叶, 烟酒]
  - category: 福利费
    keywords: [福利, 节日, 中秋, 端午, 春节礼, 员工餐, 餐补, 体检, 团建, 工会]
  - category: 研发费用
    keywords: [服务器, 云服务, 账号, 订阅, API, 域名, 软件, OpenAI, Claude, 算力, Cloudflare, GPT, GitHub, Anthropic, Pockyt, App Store, iTunes, Gift Card, 充值, 美区, SaaS, Workspace, Ahrefs]
  - category: 办公费
    keywords: [办公, 文具, 打印, 打印机, 快递, 耗材, 电脑, 显示器, 键盘, 鼠标, 笔, 纸, 公司, 采购, 开办, 支架]
  - category: 营销
    keywords: [广告, 推广, 投放, 营销, 认证, 公众号, 小程序, KOL, 直播, 抖音, SEO, 社群]
