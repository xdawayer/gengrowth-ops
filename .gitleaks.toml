title = "GenGrowth Ops Gitleaks Config"

[extend]
useDefault = true

# 全局白名单：已知安全的路径
[allowlist]
description = "Global allowlist"
paths = [
  '''onboarding/examples/.*''',
  '''templates/.*'''
]

# API Key / Token
# 注意：本仓库是产品 ops wiki，几乎全是 markdown 笔记，
# 之前的 business-sensitive 规则（融资/估值/薪酬/股权比例/投资方）误报率 100%，
# 已移除。Secret Scan 现在只关注真正的 API key / token 泄露。
[[rules]]
id = "custom-api-key"
description = "API key or token pattern"
regex = '''(?i)(api[_-]?key|access[_-]?token|secret[_-]?key|token)\s*[:=]\s*["']?[A-Za-z0-9_\-]{16,}["']?'''
tags = ["key", "token"]
