title = "GenGrowth Ops Gitleaks Config"

[extend]
useDefault = true

# 全局白名单：已知安全的路径
# 本仓库是 ops wiki，正文几乎全是 markdown 笔记，里面会贴各种业务词、
# 飞书/Lark 文档分享链接（含 view_token query 参数）等。这些不是真的
# 密钥泄露，但会被宽泛的 token regex 命中。Secret Scan 真正要防的是
# 代码文件（YAML/shell/JSON 等）里 hardcode 真实密钥，因此跳过 .md。
[allowlist]
description = "Global allowlist"
paths = [
  '''onboarding/examples/.*''',
  '''templates/.*''',
  '''.*\.md$'''
]

# API Key / Token
# 注意：本仓库是产品 ops wiki，几乎全是 markdown 笔记，
# 之前的 business-sensitive 规则（融资/估值/薪酬/股权比例/投资方）误报率 100%，
# 已移除。Secret Scan 现在只关注真正的 API key / token 泄露。
[[rules]]
id = "custom-api-key"
description = "API key or token pattern"
regex = '''(?i)(api[_-]?key|access[_-]?token|secret[_-]?key|token)\s*[:=]\s*["']?[A-Za-z0-9_\-]{16,}["']?'''
tags = ["key", "token"]
