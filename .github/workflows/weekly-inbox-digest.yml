name: Weekly Inbox Digest

# 作用: 每周一早上 9 点 (北京时间), 列出过去 7 天 inbox/ 的新增和修改文件,
# 开成一个 issue 通知 CEO/PM, 让 ta 在 GitHub Mobile 也能看到 Ops 的产出, 决定哪些上行收编到 wiki。

on:
  schedule:
    - cron: "0 1 * * 1"   # 每周一 UTC 01:00 = 北京时间 09:00
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成 digest body
        id: gen
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/weekly-digest.sh

      - name: 开 issue
        if: steps.gen.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WEEK_START: ${{ steps.gen.outputs.week_start }}
          WEEK_END: ${{ steps.gen.outputs.week_end }}
          ASSIGNEES: ${{ vars.WEEKLY_DIGEST_ASSIGNEES }}
        run: |
          ASSIGN_ARG=""
          if [ -n "$ASSIGNEES" ]; then
            ASSIGN_ARG="--assignee $ASSIGNEES"
          fi
          gh issue create \
            --repo "$REPO" \
            --title "[周报摘要] inbox/ 周变化 ${WEEK_START} → ${WEEK_END}" \
            --body-file /tmp/digest-body.md \
            --label "weekly-digest" \
            $ASSIGN_ARG
