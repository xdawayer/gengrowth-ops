name: Dispatch Inbox

# 什么时候触发：只要 main 分支的 inbox/ 目录有变化就跑
on:
  push:
    branches: [main]
    paths:
      - "inbox/**"

# 给这个 Action 的权限（最小化）
permissions:
  contents: write
  pull-requests: write

# 防止多次 push 导致并发冲突
concurrency:
  group: dispatch-inbox
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 找出 inbox 里变化的文件
        id: changed
        run: |
          # 对比上一个 commit，找出 inbox/ 里新增或修改的文件
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'inbox/' 2>/dev/null || echo "")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "发现变化文件："
          echo "$FILES"

      - name: 运行分拣脚本
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          BASE_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/dispatch-inbox.js
