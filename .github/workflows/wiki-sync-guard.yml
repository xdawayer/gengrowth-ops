name: Wiki Sync Guard

# 作用: 监测有人在 wiki-sync 白名单目录里直接提交 (绕过 wiki repo PR 流程).
# 这些目录是 wiki -> ops 单向 rsync --delete 镜像, ops 端任何修改都会在下次 sync 时被静默覆盖。
# 不自动 revert (留给人类决策), 但开 issue 警告作者修改可能丢失。

on:
  push:
    branches: [main]
    paths:
      - "docs/03-marketing/**"
      - "✍️ 内容资产/**"
      - "docs/06-shared/assets/brand/**"
      - "参考资料/产品分析/**"
      - "docs/04-programs/**"
      - "每日日报/**"
      - "参考资料/tool-guides/**"
      - "docs/05-governance/account-access/**"
      - "docs/05-governance/people-ops/policies/**"
      - "task-collab/**"

permissions:
  contents: read
  issues: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检测违规 commit
        id: check
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: bash scripts/wiki-sync-guard.sh

      - name: 开 issue
        if: steps.check.outputs.violation == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          gh label create wiki-sync-violation --repo "$REPO" --color "D93F0B" --description "在 wiki 同步目录里直接提交" 2>/dev/null || true
          gh issue create \
            --repo "$REPO" \
            --title "[wiki-sync 警告] @${ACTOR} 在 wiki 同步目录里有修改 ($(date +%Y-%m-%d))" \
            --body-file /tmp/guard-body.md \
            --label "wiki-sync-violation"
